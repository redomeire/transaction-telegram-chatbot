name: Deploy WA Gateway (Debian 12)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /root/wa-gateway 
          
          if ! command -v podman-compose &> /dev/null; then
              echo "Menginstall podman-compose via APT..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update && apt-get install -y podman-compose
          fi
          
          echo "Menarik kode terbaru..."
          git pull origin main
          
          echo "Membangun ulang container..."
          podman-compose up -d --build

          podman image prune -f
          
          echo "Deploy di Debian 12 Sukses!"
          podman ps