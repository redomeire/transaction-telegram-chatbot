version: '3.8'
services:
  wa-gateway:
    build: .
    container_name: wa-gateway
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./auth_info:/app/auth_info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"