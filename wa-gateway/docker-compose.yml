version: '3.8'
services:
  services:
  wa-gateway:
    image: wa-gateway-app:latest
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: wa-gateway
    restart: always
    tty: true
    stdin_open: true
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./auth_info:/app/auth_info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"