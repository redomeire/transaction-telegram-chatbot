name: Deploy WA Gateway (Debian 12)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'gateway/**'

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /root/transaction-whatsapp-chatbot

          echo "📥 Menarik kode terbaru..."
          git pull origin main

          cd gateway

          echo "🏗️ Membangun image..."
          podman build -t gateway:latest .

          echo "🧹 Membersihkan container lama..."
          podman rm -f wa-gateway gateway || true

          echo "🚀 Menjalankan container..."
          podman run -d \
            --name gateway \
            --restart always \
            --network host \
            --memory="512m" \
            --memory-swap="1g" \
            --log-opt max-size=10mb \
            --env-file .env \
            -v ./auth_info:/app/auth_info:Z \
            gateway:latest

          podman image prune -f

          echo "✅ Deploy Sukses! Cek status:"
          podman ps